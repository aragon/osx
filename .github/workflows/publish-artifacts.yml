name: Publish Artifacts

permissions:
  contents: read

# Tag-driven publish for @aragon/osx-artifacts. Tag the release via
# `just release X.Y.Z` from the repo root (creates `vX.Y.Z`, pushes); CI then
# builds and publishes. workflow_dispatch is an escape hatch for re-publishing
# an existing tag (e.g. after a transient NPM failure).

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      ref:
        description: 'Existing tag to publish from (e.g. v1.5.0)'
        required: true
      dist_tag:
        description: 'NPM dist-tag (latest | alpha | beta)'
        default: 'latest'

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref || github.ref }}
          submodules: recursive

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1

      - name: Install just
        uses: extractions/setup-just@v2

      - name: Install bun
        uses: oven-sh/setup-bun@v2

      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: Resolve version + dist-tag
        id: meta
        run: |
          set -euo pipefail
          ref="${{ inputs.ref || github.ref_name }}"
          [[ "$ref" =~ ^v[0-9]+\.[0-9]+\.[0-9]+(-[a-z0-9]+(\.[0-9]+)?)?$ ]] || { echo "Tag '$ref' is not vX.Y.Z"; exit 1; }
          tag_version="${ref#v}"
          pkg_version=$(jq -r '.version' npm-artifacts/package.json)
          if [[ "$tag_version" != "$pkg_version" ]]; then
            echo "Tag $ref ($tag_version) does not match package.json version ($pkg_version)"
            exit 1
          fi
          if [[ -n "${{ inputs.dist_tag }}" ]]; then
            dist_tag="${{ inputs.dist_tag }}"
          else
            dist_tag="latest"
          fi
          echo "version=$tag_version" >> "$GITHUB_OUTPUT"
          echo "dist_tag=$dist_tag" >> "$GITHUB_OUTPUT"

      - name: Build
        run: cd npm-artifacts && just build

      - name: Publish to NPM
        env:
          NPM_CONFIG_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          cd npm-artifacts
          bun publish --tag ${{ steps.meta.outputs.dist_tag }} --access public
